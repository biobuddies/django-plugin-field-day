name: export-docs
on: # yamllint disable-line rule:truthy
    push:
        branches:
            - ci-packaging
    workflow_dispatch:
defaults:
    run:
        shell: bash --noprofile --norc -o errexit -o nounset -o pipefail -o xtrace {0}
jobs:
    export-docs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Build Docker image via compose
              run: docker compose build
            - name: Inspect installed documentation packages
              run: |
                  echo '=== /usr/share/doc contents ==='
                  docker compose run --rm --entrypoint find postgres \
                      /usr/share/doc -maxdepth 2 -type d || true
                  echo '=== postgresql-doc-17 tree ==='
                  docker compose run --rm --entrypoint find postgres \
                      /usr/share/doc/postgresql-doc-17/html \
                      -maxdepth 1 -type f | head -20 || true
                  echo '=== sqlite3-doc tree ==='
                  docker compose run --rm --entrypoint find postgres \
                      /usr/share/doc/sqlite3 \
                      -maxdepth 1 -type f | head -20 || true
                  echo '=== mariadb-server doc ==='
                  docker compose run --rm --entrypoint find postgres \
                      /usr/share/doc/mariadb-server \
                      -maxdepth 1 -type f || true
            - name: Extract documentation from image
              run: |
                  docker compose create postgres
                  mkdir -p documents/postgresql documents/sqlite documents/mariadb
                  docker compose cp \
                      postgres:/usr/share/doc/postgresql-doc-17/html/. \
                      documents/postgresql/
                  docker compose cp \
                      postgres:/usr/share/doc/sqlite3/. \
                      documents/sqlite/
                  # MariaDB has no doc package on Debian trixie
                  docker compose cp \
                      postgres:/usr/share/doc/mariadb-server/. \
                      documents/mariadb/ || true
                  docker compose down
                  echo '<!DOCTYPE html><title>MariaDB docs</title>
                  <p>No <code>mariadb-doc</code> HTML package on Debian trixie.
                  See <a href="https://mariadb.com/kb/">mariadb.com/kb</a>.' \
                      > documents/mariadb/index.html
                  echo '=== extracted documents tree ==='
                  find documents -maxdepth 3 -type d
                  git add documents/
            - name: Create pull request
              uses: peter-evans/create-pull-request@v7
              with:
                  branch: documents/extracted-db-documents
                  commit-message: 'Extract DB documentation from Docker image'
                  title: Extract database documentation from Docker image
                  body: >
                      Automated extraction of HTML documentation from the
                      Docker image:
                      - **PostgreSQL 17** from `postgresql-doc-17` package
                      - **SQLite** from `sqlite3-doc` package
                      - **MariaDB**: `mariadb-doc` not on Debian trixie
                        — placeholder page added
                  labels: documentation
