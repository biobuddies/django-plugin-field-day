name: act
defaults:
    run:
        shell: bash --noprofile --norc -o errexit -o nounset -o pipefail -o xtrace {0}
env:
    ALLOWEDFLARE_EMAIL: person@emailprovider.example
    ALLOWEDFLARE_PRIVATE_DOMAIN: organization.example
    CLOUDFLARE_ACCOUNT_ID: 0123456789abcdef0123456789abcdef00
    CLOUDFLARE_ZONE_ID: 0123456789abcdef0123456789abcdef01
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    INSH_TF: tofu
    PATH: .venv/bin:/home/runner/.local/bin:/home/runner/.local/share/mise/shims:/usr/bin:/bin
jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            # Real hash is head_ref on pull_request, ref on push
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.head_ref || github.ref }}
            - uses: jdx/mise-action@v3
              with:
                  experimental: true
            - run: mise set-environment
            - run: mise pre-commit-all || true
            - run: git restore .github/workflows/act.yaml pyproject.toml
            - run: git diff --color=always --exit-code
    tabularize:
        runs-on: ubuntu-latest
        steps:
            # Real hash is head_ref on pull_request, ref on push
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.head_ref || github.ref }}
            - uses: jdx/mise-action@v3
              with:
                  experimental: true
            - run: mise tabularize
    test:
        runs-on: ubuntu-latest
        steps:
            # Real hash is head_ref on pull_request, ref on push
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.head_ref || github.ref }}
            - uses: jdx/mise-action@v3
              with:
                  experimental: true
            - run: |
                  # shellcheck disable=SC2086
                  mkdir -p $HOME/code
                  # shellcheck disable=SC2086
                  ln -s \
                    ../work/django-plugin-field-day/django-plugin-field-day \
                    $HOME/code/django-plugin-field-day

            - run: mise test

    test-db:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.head_ref || github.ref }}
            - uses: jdx/mise-action@v3
              with:
                  experimental: true
            - run: docker compose up --build --detach --wait
            - run: DATABASE_URL=postgres://postgres@127.0.0.1:5432/postgres mise test
            - run: DATABASE_URL=mysql://root@127.0.0.1:3306/test mise test

on: # yamllint disable-line rule:truthy
    pull_request:
    push:
        branches:
            - initial
    workflow_dispatch:
run-name: Checking on behalf of ${{ github.actor }}
